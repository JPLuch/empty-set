<title>Empty Set — Brew</title>

<style>
:root{--bg:#f7f6f2;--ink:#0a0a0a;--line:#0a0a0a;--soft:#e8e6e0;--grey:#888;--green:#1D9E75;--amber:#BA7517;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--ink);margin:0;max-width:680px;margin:auto;padding:0 0 80px;font-size:17px;line-height:1.5;}
.hdr{position:sticky;top:0;z-index:50;background:#fff;border-bottom:3px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:12px;}
.htitle{font-weight:700;font-size:20px;letter-spacing:.02em;}
.hsub{font-size:12px;color:var(--grey);}
.hbtn{margin-left:auto;font-family:inherit;font-size:14px;border:2px solid var(--line);background:#fff;padding:6px 12px;cursor:pointer;font-weight:700;}
.hbtn:active{background:var(--ink);color:#fff;}
.status{font-size:12px;color:var(--grey);padding:6px 18px;border-bottom:1px solid var(--soft);}
.wrap{padding:8px 18px;}
.empty{color:var(--grey);padding:40px 18px;text-align:center;font-size:15px;}

/* home */
.card{border:2px solid var(--line);background:#fff;padding:18px 18px;margin:12px 0;cursor:pointer;display:flex;align-items:center;gap:14px;}
.card:active{background:#fbfaf7;}
.card-name{font-size:26px;font-weight:700;line-height:1.15;}
.card-meta{font-size:12px;color:var(--grey);margin-top:4px;}
.card-arrow{margin-left:auto;font-size:26px;color:var(--grey);}
.dot{font-size:12px;color:var(--green);}

/* brew sheet */
.back{font-family:inherit;font-size:15px;border:none;background:none;color:var(--ink);cursor:pointer;padding:14px 18px 0;font-weight:700;}
.brewtitle{font-size:34px;font-weight:700;line-height:1.1;padding:6px 18px 2px;}
.brewmeta{font-size:13px;color:var(--grey);padding:0 18px 10px;}
.bhdr{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff;background:var(--ink);padding:8px 14px;margin:18px 0 0;}
.crow{display:flex;align-items:center;gap:14px;border:2px solid var(--soft);border-top:none;padding:16px 14px;background:#fff;cursor:pointer;}
.crow:active{background:#fbfaf7;}
.cbox{flex:0 0 auto;width:30px;height:30px;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;line-height:1;}
.cname{font-size:22px;font-weight:700;line-height:1.2;}
.cdose{margin-left:auto;font-size:20px;font-weight:700;white-space:nowrap;}
.cset{font-size:12px;color:var(--grey);}
.crow.done{background:#f3f1ec;}
.crow.done .cbox{background:var(--ink);color:#fff;}
.crow.done .cname{text-decoration:line-through;color:var(--grey);}
.crow.done .cdose{color:var(--grey);}
.toolrow{display:flex;gap:10px;align-items:center;padding:14px 18px 4px;}
.batchrow{display:flex;align-items:center;gap:8px;padding:14px 18px 0;font-size:16px;font-weight:700;}
.batchrow input{font-family:inherit;font-size:19px;font-weight:700;width:78px;border:2px solid var(--line);padding:7px 8px;text-align:center;background:#fff;}
.batchnote{font-size:11px;color:var(--grey);font-weight:400;}
.cdose-wrap{margin-left:auto;text-align:right;}
.cdose-wrap .cdose{margin-left:0;}
.cdose-wrap .cset{text-align:right;}
.progress{font-size:14px;color:var(--grey);}
.btn{font-family:inherit;font-size:14px;border:2px solid var(--line);background:#fff;padding:8px 14px;cursor:pointer;font-weight:700;}
.btn:active{background:var(--ink);color:#fff;}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:active{background:var(--green);color:#fff;}

/* notes */
.notes{margin:24px 0 0;border-top:2px solid var(--line);padding-top:14px;}
.notes-lbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);padding:0 18px;}
.bnote{border:1.5px solid var(--soft);background:#fff;padding:12px 14px;margin:10px 18px 0;}
.bnote-meta{font-size:11px;color:var(--grey);}
.bnote-text{font-size:16px;margin-top:4px;white-space:pre-wrap;}
.addbox{padding:12px 18px 0;}
.ta{font-family:inherit;width:100%;min-height:64px;font-size:16px;border:2px solid var(--line);padding:10px;resize:vertical;background:#fff;}
.readonly-tag{display:inline-block;font-size:11px;color:var(--grey);border:1px solid var(--soft);padding:2px 7px;margin:4px 18px 0;}
.pop{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 16px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:90;max-width:90%;}
.pop.show{opacity:1;}
.pop.err{background:#b3261e;}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="htitle">Empty Set · Brew</div><div class="hsub" id="hsub">brew-day checklist</div></div>
  <button class="hbtn" onclick="loadBin(true)">Refresh</button>
</div>
<div class="status" id="status">Loading from cloud…</div>
<div id="app"></div>
<div class="pop" id="pop"></div>

<script>
var BIN='6a451fcbf5f4af5e294dd7df';
var KEY='$2a$10$1KbEFw0qHA5Zg6A0mLrxy.dJPEwTs6xwxIwtz1bVnnEiB2SDEBAea';
var BURL='https://api.jsonbin.io/v3/b/'+BIN;
var CO2_GL_PER_BAR=3.3;
var METHOD_LABEL={Hot:'Hot brew',Cold:'Cold brew',N2O:'N\u2082O',CO2:'CO\u2082',Additive:'Additives',Filter:'Filter',Pasteurise:'Flash pasteurise',Carbonation:'Carbonation'};
var PREP_TYPES=['Hot','Cold','N2O','CO2','Additive','Filter','Pasteurise','Carbonation'];
var FILTER_UM={coarse:'5\u201310\u00B5m',polish:'1\u00B5m',fine:'0.45\u00B5m'};

var DATA=null;          // full bin payload {v, recipes, methods}
var loaded=false;
var view={screen:'home',id:null};

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pop(msg,err){var p=document.getElementById('pop');p.textContent=msg;p.className='pop show'+(err?' err':'');setTimeout(function(){p.className='pop';},2600);}

function latestItems(r){
  if(!r||!r.versions||!r.versions.length)return [];
  return r.versions[r.versions.length-1].items||[];
}
function latestVersion(r){return (r&&r.versions&&r.versions.length)?r.versions.length:1;}
function latestTs(r){
  if(!r||!r.versions||!r.versions.length)return null;
  return r.versions[r.versions.length-1].ts||null;
}
function fmtDate(ts){if(!ts)return '';var d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function settingUnit(m){return m==='Hot'?'min':(m==='Cold'?'hr':((m==='N2O'||m==='CO2'||m==='Carbonation')?'bar':''));}
function batchHeader(m,sample){
  var base=METHOD_LABEL[m]||m;
  if(m==='Additive')return base+' — added direct';
  if(m==='Filter')return base+((sample&&sample.set)?(' — '+(FILTER_UM[sample.set]||sample.set)):'');
  if(m==='Pasteurise')return base+' — 72–75\u00B0C';
  var setVal=sample&&sample.set!=null&&sample.set!==''?sample.set:null;
  if(m==='Carbonation')return base+(setVal!=null?(' — '+setVal+' bar (\u2248'+(CO2_GL_PER_BAR*setVal).toFixed(1)+' g/L)'):'');
  if(m==='Hot'){
    var temp=(sample&&sample.temp!=null&&sample.temp!=='')?sample.temp:null;
    var t=setVal!=null?setVal:null;
    if(temp==null)return base+(t!=null?(' — '+t+' min'):'');
    var curve=(sample&&sample.curve)||'constant';
    return base+' — '+temp+'\u00B0C, '+(t!=null?t:7)+' min'+(curve==='cooling'?', cooling':'');
  }
  return base+(setVal!=null?(' — '+setVal+' '+settingUnit(m)):'');
}
function rowSetting(it){
  if(it.method==='Filter')return FILTER_UM[it.set]||'';
  if(it.method==='Pasteurise')return 'flash 72–75\u00B0C';
  var u=settingUnit(it.method);
  if(it.method==='Additive')return '';
  if(it.set==null||it.set==='')return '';
  return it.set+' '+u;
}
function itemKey(it,idx){return idx+'|'+it.method+'|'+it.name;}

/* ---- tick state: local only, per drink+version ---- */
function tickKey(r){return 'es-brew-ticks:'+(r.id||r.name)+':v'+latestVersion(r);}
function getTicks(r){try{return JSON.parse(localStorage.getItem(tickKey(r))||'{}');}catch(e){return {};}}
function setTick(r,key,on){var t=getTicks(r);if(on)t[key]=1;else delete t[key];try{localStorage.setItem(tickKey(r),JSON.stringify(t));}catch(e){}}
function clearTicks(r){try{localStorage.removeItem(tickKey(r));}catch(e){}}

/* ---- batch size: local per drink, default 1 L ---- */
function batchKey(r){return 'es-brew-batch:'+(r.id||r.name);}
function getBatch(r){try{var v=parseFloat(localStorage.getItem(batchKey(r)));return (v>0)?v:1;}catch(e){return 1;}}
function setBatchVal(id,val){var r=findRecipe(id);if(!r)return;var n=parseFloat(val);if(!(n>0))n=1;try{localStorage.setItem(batchKey(r),String(n));}catch(e){}render();}
function fmtAmount(g){
  if(g>=1000){var kg=g/1000;return (Math.round(kg*100)/100)+' kg';}
  if(g>=100)return Math.round(g)+' g';
  if(g>=10)return (Math.round(g*10)/10)+' g';
  return (Math.round(g*100)/100)+' g';
}

/* ---- load ---- */
function loadBin(manual){
  document.getElementById('status').textContent='Loading from cloud…';
  fetch(BURL+'/latest?t='+Date.now(),{headers:{'X-Master-Key':KEY,'X-Bin-Meta':'false'}})
   .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
   .then(function(full){
     DATA=full;loaded=true;
     var n=(full.recipes||[]).length;
     document.getElementById('status').textContent=n+' drink'+(n===1?'':'s')+' · synced '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
     if(manual)pop('Synced from cloud.');
     render();
   })
   .catch(function(e){
     loaded=false;
     document.getElementById('status').textContent='\u26A0 Offline — could not reach the cloud. Pull to refresh when connected.';
     if(manual)pop('Could not reach cloud.',true);
     render();
   });
}

/* ---- render ---- */
function render(){
  var app=document.getElementById('app');
  if(!loaded&&!DATA){app.innerHTML='<div class="empty">No data yet.<br>Tap Refresh when you have a connection.</div>';return;}
  if(view.screen==='brew')renderBrew(app);
  else renderHome(app);
}
function go(screen,id){view={screen:screen,id:id||null};render();window.scrollTo(0,0);}

function renderHome(app){
  var recipes=(DATA&&DATA.recipes)||[];
  if(!recipes.length){app.innerHTML='<div class="empty">No saved drinks in the bin yet.</div>';return;}
  var sorted=recipes.slice().sort(function(a,b){return (latestTs(b)||0)-(latestTs(a)||0);});
  app.innerHTML='<div class="wrap">'+sorted.map(function(r){
    var items=latestItems(r);
    var notes=(r.brewNotes||[]).length;
    return '<div class="card" onclick="go(\'brew\',\''+esc(r.id||r.name)+'\')">'+
      '<div><div class="card-name">'+esc(r.name)+'</div>'+
      '<div class="card-meta">v'+latestVersion(r)+' · '+items.length+' ingredient'+(items.length===1?'':'s')+
        (notes?(' · <span class="dot">\u25CF</span> '+notes+' note'+(notes===1?'':'s')):'')+'</div></div>'+
      '<div class="card-arrow">\u203A</div></div>';
  }).join('')+'</div>';
}

function findRecipe(id){
  var recipes=(DATA&&DATA.recipes)||[];
  for(var i=0;i<recipes.length;i++){if((recipes[i].id||recipes[i].name)===id)return recipes[i];}
  return null;
}

function renderBrew(app){
  var r=findRecipe(view.id);
  if(!r){go('home');return;}
  var items=latestItems(r);
  var ticks=getTicks(r);
  var batch=getBatch(r);
  // group by method then by setting signature, preserving PREP order
  var groups=[];var byMethod={};
  items.forEach(function(it,idx){
    var m=it.method;var sig=m+'|'+(it.set==null?'':it.set)+'|'+(it.temp==null?'':it.temp)+'|'+(it.curve||'');
    var g=byMethod[sig];
    if(!g){g={method:m,sample:it,rows:[]};byMethod[sig]=g;groups.push(g);}
    g.rows.push({it:it,idx:idx});
  });
  groups.sort(function(a,b){return PREP_TYPES.indexOf(a.method)-PREP_TYPES.indexOf(b.method);});

  var total=items.length, done=0;
  items.forEach(function(it,idx){if(ticks[itemKey(it,idx)])done++;});

  var checklist=groups.map(function(g){
    var rows=g.rows.map(function(o){
      var it=o.it,idx=o.idx,key=itemKey(it,idx),on=!!ticks[key];
      var setTxt=rowSetting(it);
      var doseHtml;
      if(it.method==='Filter'||it.method==='Pasteurise'){
        doseHtml='';
      } else if(it.method==='Carbonation'){
        doseHtml='<div class="cdose">\u2248'+(CO2_GL_PER_BAR*(it.set||0)).toFixed(1)+' g/L</div>';
      } else {
        var perL=(it.dose!=null?it.dose:0);
        doseHtml='<div class="cdose-wrap"><div class="cdose">'+esc(fmtAmount(perL*batch))+'</div><div class="cset">'+perL+' g/L</div></div>';
      }
      return '<div class="crow'+(on?' done':'')+'" onclick="toggle(\''+esc(view.id)+'\',\''+esc(key)+'\')">'+
        '<div class="cbox">'+(on?'\u2713':'')+'</div>'+
        '<div><div class="cname">'+esc(it.name)+'</div>'+(setTxt?'<div class="cset">'+esc(setTxt)+'</div>':'')+'</div>'+
        doseHtml+'</div>';
    }).join('');
    return '<div class="bhdr">'+esc(batchHeader(g.method,g.sample))+'</div>'+rows;
  }).join('');

  var notes=(r.brewNotes||[]).slice().reverse().map(function(n){
    return '<div class="bnote"><div class="bnote-meta">'+fmtDate(n.ts)+'</div><div class="bnote-text">'+esc(n.text)+'</div></div>';
  }).join('')||'<div style="font-size:14px;color:var(--grey);padding:8px 18px;">No notes yet.</div>';

  app.innerHTML=
    '<button class="back" onclick="go(\'home\')">\u2039 All drinks</button>'+
    '<div class="brewtitle">'+esc(r.name)+'</div>'+
    '<div class="brewmeta">v'+latestVersion(r)+' · '+fmtDate(latestTs(r))+'</div>'+
    '<span class="readonly-tag">read-only · tick as you go</span>'+
    '<div class="batchrow">Batch <input type="number" step="0.5" min="0.1" value="'+batch+'" onchange="setBatchVal(\''+esc(view.id)+'\',this.value)"> L <span class="batchnote">amounts scale to your volume</span></div>'+
    '<div class="toolrow"><span class="progress">'+done+' / '+total+' done</span>'+
      '<button class="btn" style="margin-left:auto;" onclick="resetTicks(\''+esc(view.id)+'\')">Reset checklist</button></div>'+
    checklist+
    '<div class="notes"><div class="notes-lbl">Brewing notes <span style="font-weight:400;text-transform:none;">(shared with the model app)</span></div>'+
      notes+
      '<div class="addbox"><textarea class="ta" id="newnote" placeholder="what you did, how it tasted, tweaks for next time…"></textarea>'+
      '<div style="margin-top:8px;"><button class="btn green" onclick="addNote(\''+esc(view.id)+'\')"'+(loaded?'':' disabled')+'>Add note</button>'+
      (loaded?'':'<span style="font-size:11px;color:var(--grey);margin-left:8px;">offline — refresh to add</span>')+'</div></div>'+
    '</div>';
}

function toggle(id,key){
  var r=findRecipe(id);if(!r)return;
  var ticks=getTicks(r);var on=!ticks[key];
  setTick(r,key,on);
  render();
}
function resetTicks(id){
  var r=findRecipe(id);if(!r)return;
  if(!confirm('Clear all ticks for '+r.name+'?'))return;
  clearTicks(r);render();pop('Checklist reset.');
}

/* ---- add note: safe fetch-latest -> append -> PUT full ---- */
function addNote(id){
  var ta=document.getElementById('newnote');var text=(ta&&ta.value||'').trim();
  if(!text){pop('Write a note first.',true);return;}
  pop('Saving note…');
  fetch(BURL+'/latest?t='+Date.now(),{headers:{'X-Master-Key':KEY,'X-Bin-Meta':'false'}})
   .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
   .then(function(full){
     var recipes=full.recipes||[];var target=null;
     for(var i=0;i<recipes.length;i++){if((recipes[i].id||recipes[i].name)===id){target=recipes[i];break;}}
     if(!target)throw new Error('drink not found in cloud');
     target.brewNotes=target.brewNotes||[];
     target.brewNotes.push({ts:Date.now(),text:text});
     return fetch(BURL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':KEY},body:JSON.stringify(full)})
       .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('PUT '+r.status+' '+t.slice(0,80));});return full;});
   })
   .then(function(full){
     DATA=full;loaded=true;
     pop('Note saved — visible in both apps.');
     render();
   })
   .catch(function(e){pop('Save failed: '+e.message,true);});
}

loadBin(false);
</script>
</body>
</html>
